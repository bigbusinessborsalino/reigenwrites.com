<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reigen | Bot Dashboard</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            margin: 0;
            padding: 40px 20px;
        }
        .dashboard {
            max-width: 600px;
            margin: 0 auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p.subtitle {
            color: #94a3b8;
            margin-top: 0;
            margin-bottom: 30px;
        }
        .stat-box {
            background: #0f172a;
            border: 1px solid #38bdf8;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .stat-number {
            font-size: 48px;
            font-weight: bold;
            color: #10b981;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }
        .stat-label {
            color: #cbd5e1;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }
        .qr-section {
            background: #0f172a;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .qr-img {
            width: 200px;
            height: 200px;
            background: #cbd5e1;
            margin: 15px auto;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f172a;
            font-weight: bold;
        }
        .footer-text {
            margin-top: 15px;
            color: #64748b;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>System Status</h1>
        <p class="subtitle">Reigen's Automated Delivery Network</p>

        <div class="stat-box">
            <div class="stat-number" id="visitor-count">Loading...</div>
            <div class="stat-label">Total Bot Verifications</div>
        </div>

        <div class="qr-section">
            <h3 style="color: #f1f5f9; margin-top: 0;">Support the Server Costs</h3>
            <p style="color: #94a3b8; font-size: 14px;">Servers aren't free. Scan to keep the bot alive.</p>
            
            <img class="qr-img" src="YOUR_QR_CODE_LINK_HERE" alt="Payment QR Code">
            
            <p class="footer-text">Accepting UPI securely. Identity protected.</p>
        </div>
    </div>

    <script>
        // Fetches a live count from a free public API
        // Every time someone visits, the number goes up!
        async function updateCounter() {
            try {
                const response = await fetch('https://api.counterapi.dev/v1/reigenwrites/bot_verifications/up');
                const data = await response.json();
                document.getElementById('visitor-count').innerText = data.count.toLocaleString();
            } catch (error) {
                document.getElementById('visitor-count').innerText = "SYSTEM OFFLINE";
            }
        }
        
        // Run immediately on load
        updateCounter();
    </script>

</body>
</html>
