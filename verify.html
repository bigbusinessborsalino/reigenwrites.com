<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying Connection...</title>
    
    <script src="https://quge5.com/88/tag.min.js" data-zone="215378" async data-cfasync="false"></script>

    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; color: #333; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        
        /* 🛡️ SAFE ZONE LAYOUT: Ads stay on the sides, Game stays center */
        .wrapper { display: flex; flex-direction: row; width: 100%; max-width: 1200px; justify-content: space-between; align-items: flex-start; padding: 20px; box-sizing: border-box; }
        
        .ad-side { width: 160px; min-height: 400px; background: transparent; display: flex; align-items: center; justify-content: center; padding: 10px; border-radius: 8px; }
        
        .main-content { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; flex-grow: 1; max-width: 420px; margin: 0 10px; border: 1px solid #e5e5e5; z-index: 10; }
        
        h2 { color: #0f0f0f; margin-top: 0; font-size: 18px; }
        #timer-text { font-size: 15px; font-weight: bold; margin: 10px 0; color: #0f0f0f; }
        
        .btn { display: none; background: #ff0000; color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; width: 100%; margin-top: 10px; }
        
        /* 🐍 SNAKE GAME STYLES */
        canvas { background-color: #0f172a; border: 2px solid #334155; border-radius: 5px; display: block; margin: 0 auto; touch-action: none; }
        
        .ctrl-btn { background: #f2f2f2; border: 1px solid #ccc; padding: 15px; border-radius: 8px; font-size: 20px; color: #0f0f0f; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .ctrl-btn:active { background: #e5e5e5; }
        
        .d-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px auto; max-width: 180px; }
        .d-pad .up { grid-column: 2; } .d-pad .left { grid-column: 1; } .d-pad .right { grid-column: 3; } .d-pad .down { grid-column: 2; }

        /* 📱 MOBILE: Stack ads top/bottom to keep white space clear */
        @media (max-width: 768px) {
            .wrapper { flex-direction: column; align-items: center; }
            .ad-side { width: 100%; min-height: 80px; order: 2; }
            .main-content { order: 1; margin: 10px 0; width: 100%; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="ad-side">
        </div>

    <div class="main-content">
        <h2>Verify to Continue...</h2>

        <canvas id="snakeCanvas" width="220" height="220"></canvas>
        
        <div class="d-pad">
            <button class="ctrl-btn up" onclick="setDirection('UP')">▲</button>
            <button class="ctrl-btn left" onclick="setDirection('LEFT')">◀</button>
            <button class="ctrl-btn right" onclick="setDirection('RIGHT')">▶</button>
            <button class="ctrl-btn down" onclick="setDirection('DOWN')">▼</button>
        </div>

        <p id="timer-text">Wait <span id="time" style="color:red; font-size:22px;">60</span> seconds to unlock...</p>
        
        <button id="unlock-btn" class="btn" onclick="returnToBot()">🔓 Unlock Bot Now</button>
    </div>

    <div class="ad-side">
        </div>
</div>

<script>
    // --- TIMER & REDIRECT ---
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const botUser = urlParams.get('bot');

    let timeLeft = 60; 
    const timerElement = document.getElementById('time');
    const unlockBtn = document.getElementById('unlock-btn');

    const countdown = setInterval(() => {
        timeLeft--;
        timerElement.innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            document.getElementById('timer-text').style.display = 'none'; 
            unlockBtn.style.display = 'block'; 
        }
    }, 1000);

    function returnToBot() {
        if (token && botUser) { 
            window.location.href = `https://t.me/${botUser}?start=${token}`; 
        } else { 
            alert("Error: Please restart the bot search."); 
        }
    }

    // --- GAME LOGIC ---
    const canvas = document.getElementById("snakeCanvas");
    const ctx = canvas.getContext("2d");
    const box = 10;
    let snake = [{ x: 10 * box, y: 10 * box }];
    let food = { x: Math.floor(Math.random() * 22) * box, y: Math.floor(Math.random() * 22) * box };
    let d = "RIGHT";

    function setDirection(newDir) {
        if(newDir == "LEFT" && d != "RIGHT") d = "LEFT";
        if(newDir == "UP" && d != "DOWN") d = "UP";
        if(newDir == "RIGHT" && d != "LEFT") d = "RIGHT";
        if(newDir == "DOWN" && d != "UP") d = "DOWN";
    }

    function draw() {
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for(let i = 0; i < snake.length; i++){
            ctx.fillStyle = (i == 0) ? "#10b981" : "#059669";
            ctx.fillRect(snake[i].x, snake[i].y, box, box);
        }

        ctx.fillStyle = "#ff0000";
        ctx.fillRect(food.x, food.y, box, box);

        let snakeX = snake[0].x;
        let snakeY = snake[0].y;

        if( d == "LEFT") snakeX -= box;
        if( d == "UP") snakeY -= box;
        if( d == "RIGHT") snakeX += box;
        if( d == "DOWN") snakeY += box;

        if(snakeX == food.x && snakeY == food.y) {
            food = { x: Math.floor(Math.random() * 22) * box, y: Math.floor(Math.random() * 22) * box };
        } else { snake.pop(); }

        let newHead = { x: snakeX, y: snakeY };

        if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
            snake = [{ x: 10 * box, y: 10 * box }];
            d = "RIGHT";
        } else {
            snake.unshift(newHead);
        }
    }

    function collision(head, array) {
        for(let i = 0; i < array.length; i++) {
            if(head.x == array[i].x && head.y == array[i].y) return true;
        }
        return false;
    }

    let game = setInterval(draw, 100);
</script>

</body>
</html>
