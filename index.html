<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Access Documentation</title>

<style>

body{
background:#f9f9f9;
font-family:Arial, Helvetica, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:40px;
border-radius:12px;
border:1px solid #e5e5e5;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
width:320px;
text-align:center;
}

h2{
margin-top:0;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

button{
margin-top:15px;
width:100%;
padding:10px;
background:#0f0f0f;
color:white;
border:none;
border-radius:6px;
font-size:14px;
cursor:pointer;
}

button:hover{
background:#333;
}

.note{
font-size:12px;
color:#666;
margin-top:10px;
}

</style>
</head>

<body>

<div class="box">

<h2>Access Documentation</h2>

<input id="name" placeholder="Your Name">
<input id="email" placeholder="Email Address">

<button onclick="register()">Continue</button>

<p class="note">Enter your details to view documentation</p>

</div>

<script>

if(localStorage.getItem("doc_user")){
window.location="docs.html"
}

function register(){

const name=document.getElementById("name").value
const email=document.getElementById("email").value

if(!name || !email){
alert("Enter name and email")
return
}

localStorage.setItem("doc_user",JSON.stringify({name,email}))

window.location="docs.html"

}

</script>

</body>
</html>
