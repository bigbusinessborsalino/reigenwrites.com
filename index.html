<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Access Documentation</title>

<style>
body{
background:#f9f9f9;
font-family:Arial,Helvetica,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0
}

.box{
background:#fff;
padding:32px;
border-radius:10px;
border:1px solid #eee;
box-shadow:0 6px 20px rgba(0,0,0,.05);
width:320px;
text-align:center
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
box-sizing:border-box
}

button{
margin-top:14px;
width:100%;
padding:10px;
background:#0f0f0f;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:600
}

button:disabled{
opacity:0.6;
cursor:not-allowed
}

.hint{
font-size:12px;
color:#666;
margin-top:10px
}

.error{
color:#b00020;
margin-top:10px;
font-size:13px
}

.success{
color:green;
margin-top:10px;
font-size:13px
}
</style>
</head>

<body>

<div class="box">

<h2>Access Documentation</h2>

<input id="name" placeholder="Your name">
<input id="email" placeholder="Email address">

<button id="sendBtn">Send OTP</button>

<input id="otp" placeholder="Enter OTP" style="display:none;">
<button id="verifyBtn" style="display:none;">Verify & Continue</button>

<div class="hint">
We verify your email before access.
</div>

<div id="msg" class="error" style="display:none"></div>

</div>

<script>

const sendBtn = document.getElementById("sendBtn");
const verifyBtn = document.getElementById("verifyBtn");
const msgEl = document.getElementById("msg");

let currentEmail = "";

// 🔥 CHANGE THIS to your real backend
const BASE_URL = ""; 
// If same domain → keep ""
// If different → "https://your-backend-url"

// =======================
// SEND OTP
// =======================

sendBtn.addEventListener("click", async () => {

msgEl.style.display="none";

const name = document.getElementById("name").value.trim();
const email = document.getElementById("email").value.trim().toLowerCase();

if(!name || !email){
  return showError("Enter name and email");
}

if(!/\S+@\S+\.\S+/.test(email)){
  return showError("Enter valid email");
}

sendBtn.disabled = true;
sendBtn.textContent = "Sending OTP...";

try{

const res = await fetch(BASE_URL + "/send-otp",{
  method:"POST",
  headers:{ "Content-Type":"application/json" },
  body:JSON.stringify({email})
});

if(!res.ok){
  throw new Error();
}

currentEmail = email;

showSuccess("OTP sent! Check your email.");

document.getElementById("otp").style.display = "block";
verifyBtn.style.display = "block";

sendBtn.textContent = "Resend OTP";
sendBtn.disabled = false;

}catch(err){
showError("Failed to send OTP");
sendBtn.disabled = false;
sendBtn.textContent = "Send OTP";
}

});

// =======================
// VERIFY + REGISTER
// =======================

verifyBtn.addEventListener("click", async () => {

msgEl.style.display="none";

const name = document.getElementById("name").value.trim();
const otp = document.getElementById("otp").value.trim();

if(!otp){
  return showError("Enter OTP");
}

verifyBtn.disabled = true;
verifyBtn.textContent = "Verifying...";

try{

// VERIFY OTP
const verifyRes = await fetch(BASE_URL + "/verify-otp",{
  method:"POST",
  headers:{ "Content-Type":"application/json" },
  body:JSON.stringify({
    email: currentEmail,
    otp
  })
});

if(!verifyRes.ok){
  throw new Error("OTP invalid");
}

// REGISTER
const registerRes = await fetch(BASE_URL + "/register",{
  method:"POST",
  headers:{ "Content-Type":"application/json" },
  body:JSON.stringify({
    name,
    email: currentEmail
  })
});

if(!registerRes.ok){
  throw new Error("Register failed");
}

// SUCCESS
localStorage.setItem("doc_user",JSON.stringify({
  name,
  email: currentEmail
}));

window.location = "docs.html";

}catch(err){
showError(err.message || "Verification failed");
verifyBtn.disabled = false;
verifyBtn.textContent = "Verify & Continue";
}

});

// =======================
// HELPERS
// =======================

function showError(text){
msgEl.className = "error";
msgEl.innerText = text;
msgEl.style.display = "block";
}

function showSuccess(text){
msgEl.className = "success";
msgEl.innerText = text;
msgEl.style.display = "block";
}

// =======================
// AUTO REDIRECT
// =======================

if(localStorage.getItem("doc_user")){
window.location="docs.html";
}

</script>

</body>
</html>
