<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Dashboard</title>
    <style>
        body {
            background-color: #f9f9f9; 
            color: #0f0f0f; 
            font-family: 'Roboto', Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 60px 20px;
        }
        .dashboard {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff; 
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e5e5e5;
        }
        h1 {
            color: #0f0f0f;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .stat-box {
            background: #f9f9f9;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 40px 20px;
        }
        .stat-number {
            font-size: 64px;
            font-weight: bold;
            color: #ff0000; 
        }
        .stat-label {
            color: #606060; 
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>System Status</h1>

        <div class="stat-box">
            <div class="stat-number" id="visitor-count">...</div>
            <div class="stat-label">Total Bot Verifications</div>
        </div>
    </div>

    <script>
        async function updateCounter() {
            try {
                const response = await fetch('https://api.counterapi.dev/v1/reigenwrites/bot_verifications/up');
                const data = await response.json();
                document.getElementById('visitor-count').innerText = data.count.toLocaleString();
            } catch (error) {
                document.getElementById('visitor-count').innerText = "OFFLINE";
            }
        }
        
        updateCounter();
    </script>

</body>
</html>
